<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact — Lukas</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="brand">Lukas</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="work.html">My Work</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <main class="container">
      <section class="contact">
        <h1>Contact</h1>
        <p class="lead">I'm open to new projects and collaborations. Drop me a message and I'll get back to you.</p>

        <form class="contact-form" action="#" method="post">
          <label>
            Your name
            <input type="text" name="name" placeholder="Your name" />
          </label>
          <label>
            Your email
            <input type="email" name="email" placeholder="you@domain.com" />
          </label>
          <label>
            Message
            <textarea name="message" rows="6" placeholder="Tell me about your project"></textarea>
          </label>
          <button type="submit" class="btn">Send message</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <div>© <strong>Lukas</strong></div>
    </footer>

    <div id="custom-cursor" aria-hidden="true">
      <div class="cursor-arrow" aria-hidden="true"></div>
      <div class="cursor-label">Lukas</div>
    </div>

    <script src="assets/cursor.js"></script>
  </body>
</html>
